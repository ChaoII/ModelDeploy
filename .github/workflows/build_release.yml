name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - v*
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  PROJECT_NAME: "ModelDeploy"

jobs:
  # ==================== CPU 构建 + 测试 ====================
  cpu:
    name: CPU (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            ext: tar.gz

          - name: windows
            runner: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - if: runner.os == 'Windows'
        run: choco install openssl -y

      - name: Download test data
        shell: bash
        run: |
          curl -L -o test_data.zip https://www.modelscope.cn/models/ChaoII0987/ModelDeploy_cmake_deps/resolve/master/test_data.zip
          unzip -q test_data.zip

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DBUILD_AUDIO=ON -DBUILD_VISION=ON -DBUILD_CAPI=ON
          -DWITH_GPU=OFF

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        run: ctest -C Release --output-on-failure
        env:
          TEST_DATA_DIR: ${{ github.workspace }}

      - name: Package
        shell: bash
        run: |
          cmake --install build --prefix install
          VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev_{0}', github.run_id) }}"
          NAME="${PROJECT_NAME}_${VERSION}_${{ matrix.runner == 'ubuntu-latest' && 'linux-x64' || 'win-x64' }}"
          echo "PKG=${NAME}.${{ matrix.ext }}" >> $GITHUB_ENV
          if [ "${{ matrix.ext }}" = "zip" ]; then 7z a "${NAME}.zip" ./install/*; else tar -czf "${NAME}.tar.gz" -C install .; fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG }}
          path: ${{ env.PKG }}
          retention-days: 7

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PKG }}

  # ==================== GPU 构建（仅编译，无测试） ====================
  gpu:
    name: GPU (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            ext: tar.gz

          - name: windows
            runner: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          toolset: 14.40
          arch: x64

      - name: Install OpenSSL
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - if: runner.os == 'Windows'
        run: choco install openssl -y

      - name: Setup CUDA
        uses: Jimver/cuda-toolkit@master
        with:
          cuda: "12.8.1"

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DBUILD_AUDIO=ON -DBUILD_VISION=ON -DBUILD_CAPI=ON
          -DWITH_GPU=ON -DENABLE_TRT=OFF

      - name: Build
        run: cmake --build build

      - name: Package
        shell: bash
        run: |
          cmake --install build --prefix install
          VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev_{0}', github.run_id) }}"
          NAME="${PROJECT_NAME}_${VERSION}_${{ matrix.runner == 'ubuntu-latest' && 'linux-x64-gpu' || 'win-x64-gpu' }}"
          echo "PKG=${NAME}.${{ matrix.ext }}" >> $GITHUB_ENV
          if [ "${{ matrix.ext }}" = "zip" ]; then 7z a "${NAME}.zip" ./install/*; else tar -czf "${NAME}.tar.gz" -C install .; fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG }}
          path: ${{ env.PKG }}
          retention-days: 7

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PKG }}
