name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - v*
  pull_request:
    branches: [ main ]

env:
  PROJECT_NAME: "ModelDeploy"

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false

      matrix:
        include:
          - name: linux-cpu
            runner: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            artifact_arch: linux-x64
            ext: tar.gz
            with_gpu: false
            is_windows: false

          - name: windows-cpu
            runner: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            artifact_arch: win-x64
            ext: zip
            with_gpu: false
            is_windows: true

          - name: linux-gpu
            runner: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            artifact_arch: linux-x64-gpu
            ext: tar.gz
            with_gpu: true
            is_windows: false
            cuda_arch: "12.4"

          - name: windows-gpu
            runner: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            artifact_arch: win-x64-gpu
            ext: zip
            with_gpu: true
            is_windows: true
            cuda_arch: "12.4"

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Setup MSVC
        if: matrix.is_windows
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        run: choco install openssl -y

      - name: Setup CUDA
        if: matrix.with_gpu
        uses: Jimver/cuda-toolkit@v0.2
        with:
          cuda: ${{ matrix.cuda_arch }}

      - name: Set GPU flags
        shell: bash
        run: |
          if [ "${{ matrix.with_gpu }}" = "true" ]; then
            echo "GPU_FLAG=ON" >> $GITHUB_ENV
          else
            echo "GPU_FLAG=OFF" >> $GITHUB_ENV
          fi
          echo "TRT_FLAG=OFF" >> $GITHUB_ENV

      - name: Configure
        run: >
          cmake -S .
          -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DBUILD_AUDIO=ON
          -DBUILD_VISION=ON
          -DBUILD_CAPI=ON
          -DWITH_GPU=${{ env.GPU_FLAG }}
          -DENABLE_TRT=${{ env.TRT_FLAG }}
          -DENABLE_ORT=ON
          -DENABLE_MNN=ON
          -DBUILD_PYTHON=OFF

      - name: Build
        run: cmake --build build

      - name: Download test data
        shell: bash
        run: |
          curl -L -o test_data.zip https://www.modelscope.cn/models/ChaoII0987/ModelDeploy_cmake_deps/resolve/master/test_data.zip
          unzip -q test_data.zip

      - name: Test
        if: ${{ !matrix.with_gpu }}
        working-directory: build
        run: ctest -C Release --output-on-failure
        env:
          TEST_DATA_DIR: ${{ github.workspace }}

      - name: Install
        run: cmake --install build --prefix install

      - name: Package
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            TIMESTAMP=$(date +'%Y%m%d%H%M%S')
            VERSION="dev_${TIMESTAMP}"
          fi
          NAME="${PROJECT_NAME}_${VERSION}_${{ matrix.artifact_arch }}"
          echo "NAME=${NAME}" >> $GITHUB_ENV
          if [ "${{ matrix.ext }}" = "zip" ]; then
            7z a "${NAME}.zip" ./install/*
            echo "PKG=${NAME}.zip" >> $GITHUB_ENV
          else
            tar -czf "${NAME}.tar.gz" -C install .
            echo "PKG=${NAME}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload CI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG }}
          path: ${{ env.PKG }}
          retention-days: 7

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.PKG }}
