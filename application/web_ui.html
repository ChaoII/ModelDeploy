<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Surveillance Platform</title>
<link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--sidebar-width:240px}
body{background:#f0f2f5;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-width);height:100vh;background:linear-gradient(180deg,#1a1d3e 0%,#0d0f23 100%);color:#fff;z-index:100;padding:0;overflow-y:auto}
.sidebar-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.sidebar-brand .logo{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.sidebar-brand .logo i{color:#4e8cff;font-size:22px}
.sidebar-brand .logo span{color:#4e8cff}
.sidebar-brand small{display:block;font-size:11px;color:rgba(255,255,255,.35);margin-top:4px;font-weight:400}
.sidebar .nav-item{padding:8px 18px;margin:2px 8px;border-radius:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,.55)}
.sidebar .nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.sidebar .nav-item.active{background:rgba(78,140,255,.15);color:#4e8cff;font-weight:600}
.sidebar .nav-item i{font-size:16px;width:20px;text-align:center}
.main-content{margin-left:var(--sidebar-width);min-height:100vh}
.topbar{background:#fff;padding:12px 24px;border-bottom:1px solid #e8eaed;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.topbar h5{font-weight:600;color:#1a1d3e;margin:0;font-size:16px}
.topbar .status-badge{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 14px;border-radius:20px}
.topbar .status-badge.on{background:#e8f5e9;color:#2e7d32}
.topbar .status-badge.off{background:#fbe9e7;color:#c62828}
.content{padding:20px 24px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #e8eaed;transition:box-shadow .2s}
.stat-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.stat-card .num{font-size:28px;font-weight:700;line-height:1.2}
.stat-card .label{font-size:12px;color:#888;margin-top:2px}
.stat-card .num.primary{color:#4e8cff}
.stat-card .num.success{color:#4caf50}
.stat-card .num.danger{color:#f44336}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.table-container{background:#fff;border-radius:10px;border:1px solid #e8eaed;overflow:hidden}
.table-container .table-header{padding:14px 18px;border-bottom:1px solid #e8eaed;display:flex;justify-content:space-between;align-items:center}
.table-container .table-header h6{margin:0;font-weight:600;color:#1a1d3e;font-size:14px}
.table{ margin-bottom:0;font-size:13px}
.table th{background:#f8f9fa;color:#555;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;padding:10px 14px;border-bottom:2px solid #e8eaed}
.table td{padding:10px 14px;vertical-align:middle;border-bottom:1px solid #f0f0f0}
.table tr:hover{background:#f8f9ff}
.table tr:last-child td{border-bottom:none}
.status-badge-sm{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:500}
.status-badge-sm.on{background:#e8f5e9;color:#2e7d32}
.status-badge-sm.off{background:#f5f5f5;color:#999}
.model-tags{display:flex;gap:3px;flex-wrap:wrap}
.model-tags .tag{padding:1px 8px;border-radius:3px;font-size:10px;background:#f0f4ff;color:#4e8cff}
.bi-dot{font-size:8px;vertical-align:middle}
.log-panel{background:#fff;border-radius:10px;border:1px solid #e8eaed;margin-top:16px}
.log-panel .log-header{padding:12px 18px;border-bottom:1px solid #e8eaed;display:flex;justify-content:space-between;align-items:center}
.log-panel .log-header h6{margin:0;font-size:13px;font-weight:600;color:#1a1d3e}
.log-panel .log-body{padding:8px 18px;max-height:120px;overflow-y:auto;font-family:'SF Mono','Consolas',monospace;font-size:11px;line-height:1.8;color:#555}
.log-panel .log-body .time{color:#aaa}
.log-panel .log-body .info{color:#4e8cff}
.log-panel .log-body .ok{color:#4caf50}
.log-panel .log-body .err{color:#f44336}
.modal-content{border-radius:10px;border:none;box-shadow:0 10px 40px rgba(0,0,0,.15)}
.modal-header{border-bottom:1px solid #f0f0f0;padding:16px 20px}
.modal-header .modal-title{font-weight:600;font-size:15px}
.modal-body{padding:20px}
.modal-footer{border-top:1px solid #f0f0f0;padding:12px 20px}
.form-label{font-size:12px;font-weight:500;color:#555;margin-bottom:3px}
.form-control,.form-select{font-size:13px;border-radius:6px;border-color:#e0e0e0}
.form-control:focus,.form-select:focus{border-color:#4e8cff;box-shadow:0 0 0 3px rgba(78,140,255,.1)}
textarea.form-control{font-family:'SF Mono','Consolas',monospace;font-size:11px}
.empty-state{text-align:center;padding:40px 20px;color:#bbb}
.empty-state i{font-size:40px;margin-bottom:10px;display:block}
.toast-container{position:fixed;bottom:20px;right:20px;z-index:9999}
.alert-toast{padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.1);margin-top:8px;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<div class="sidebar">
<div class="sidebar-brand">
<div class="logo"><i class="bi-camera-video"></i>AI <span>Surveillance</span></div>
<small>GPU-Accelerated Video Analysis</small>
</div>
<div style="padding:16px 0">
<div class="nav-item active"><i class="bi-grid-3x3-gap-fill"></i> Dashboard</div>
<div class="nav-item" onclick="openCreateModal()"><i class="bi-plus-circle"></i> New Task</div>
</div>
</div>

<div class="main-content">
<div class="topbar">
<h5><i class="bi-grid-3x3-gap-fill me-2" style="color:#4e8cff"></i>Dashboard</h5>
<span id="connBadge" class="status-badge on"><i class="bi-check-circle-fill"></i> Connected</span>
</div>

<div class="content">
<div class="stats-row" id="statsRow"></div>

<div class="table-container">
<div class="table-header">
<h6><i class="bi-list-task me-1"></i> Tasks</h6>
<button class="btn btn-primary btn-sm" onclick="openCreateModal()"><i class="bi-plus-lg"></i> New Task</button>
</div>
<div id="tableBody">
<div class="empty-state"><i class="bi-inbox"></i><div>No tasks yet</div></div>
</div>
</div>

<div class="log-panel">
<div class="log-header"><h6><i class="bi-journal-text me-1"></i> Activity Log</h6><span id="logCount" style="font-size:11px;color:#aaa">0 events</span></div>
<div class="log-body" id="logBody"><span class="time">System initialized</span></div>
</div>
</div>
</div>

<!-- Create Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content">
<div class="modal-header"><h5 class="modal-title"><i class="bi-plus-circle me-1" style="color:#4e8cff"></i> Create New Task</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
<div class="row g-3">
<div class="col-md-6"><label class="form-label">Task ID</label><input class="form-control" id="f_id" placeholder="e.g. cam1"></div>
<div class="col-md-6"><label class="form-label">Task Name</label><input class="form-control" id="f_name" placeholder="e.g. Main Entrance"></div>
<div class="col-12"><label class="form-label">Input RTSP URL</label><input class="form-control" id="f_input" placeholder="rtsp://..." value="rtsp://127.0.0.1:554/live/obs_test3"></div>
<div class="col-md-4"><label class="form-label">Output Type</label><select class="form-select" id="f_outtype" onchange="updateOutField()"><option value="rtsp">RTSP Stream</option><option value="mp4">MP4 File</option></select></div>
<div class="col-md-8"><label class="form-label" id="f_outlabel">Output RTSP URL</label><input class="form-control" id="f_output" placeholder="rtsp://..." value="rtsp://127.0.0.1:554/live/surveillance_out"></div>
<div class="col-12"><label class="form-label">Model Configuration <span style="color:#999;font-weight:400">(JSON array, one or more models)</span></label><textarea class="form-control" id="f_models" rows="4">[{"name":"yolo11n","type":"detection","path":"E:/CLionProjects/ModelDeploy/test_data/test_models/yolo11n_nms.onnx","backend":"ort","device":"gpu","confidence_threshold":0.5,"input_size":[640,640],"interval":1}]</textarea></div>
</div>
</div>
<div class="modal-footer">
<button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
<button type="button" class="btn btn-primary" onclick="createTask()"><i class="bi-play-fill"></i> Create &amp; Start</button>
</div>
</div>
</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script>
var logs=[],modal=null;
document.addEventListener('DOMContentLoaded',function(){modal=new bootstrap.Modal(document.getElementById('createModal'))});

function log(msg,tp){tp=tp||'info';var b=document.getElementById('logBody');var d=new Date();var ts=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0');b.innerHTML+='<div><span class="time">['+ts+']</span> <span class="'+tp+'">'+esc(msg)+'</span></div>';b.scrollTop=b.scrollHeight;document.getElementById('logCount').textContent=(++logs.length)+' events'}
function toast(msg,t){var c=document.getElementById('toastContainer');var d=document.createElement('div');d.className='alert-toast alert alert-'+(t||'info')+' d-flex align-items-center gap-2';d.innerHTML='<i class="bi-'+(t=='danger'?'exclamation-circle':t=='success'?'check-circle':'info-circle')+'"></i>'+esc(msg);c.appendChild(d);setTimeout(function(){d.remove()},4000)}
function esc(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function api(m,u,b,cb){var x=new XMLHttpRequest();x.open(m,u,true);x.setRequestHeader('Content-Type','application/json');x.onload=function(){var r;try{r=JSON.parse(x.responseText)}catch(e){r={ok:false}}cb(r)};x.onerror=function(){cb({ok:false});document.getElementById('connBadge').className='status-badge off';document.getElementById('connBadge').innerHTML='<i class="bi-exclamation-circle-fill"></i> Disconnected'}}
function updateOutField(){var t=document.getElementById('f_outtype').value;document.getElementById('f_outlabel').textContent=t=='mp4'?'Output File Path':'Output RTSP URL';document.getElementById('f_output').placeholder=t=='mp4'?'/path/to/output.mp4':'rtsp://destination'}
function openCreateModal(){if(modal)modal.show()}

function render(tasks){
 var s=document.getElementById('statsRow');
 s.innerHTML=
  '<div class="stat-card"><div class="num primary">'+tasks.length+'</div><div class="label">Total Tasks</div></div>'+
  '<div class="stat-card"><div class="num success">'+tasks.filter(function(t){return t.running}).length+'</div><div class="label">Running</div></div>'+
  '<div class="stat-card"><div class="num danger">'+tasks.filter(function(t){return !t.running}).length+'</div><div class="label">Stopped</div></div>';
 var tb=document.getElementById('tableBody');
 if(tasks.length===0){tb.innerHTML='<div class="empty-state"><i class="bi-inbox"></i><div>No tasks yet</div></div>';return}
 var h='<table class="table"><thead><tr><th style="width:40px">#</th><th>Task</th><th>Input</th><th>Output</th><th>Models</th><th style="width:80px">Status</th><th style="width:180px">Actions</th></tr></thead><tbody>';
 tasks.forEach(function(t,i){
  var mh='';if(t.models){t.models.forEach(function(m){mh+='<span class="tag">'+esc(m.name)+'</span>'})}
  h+='<tr><td>'+(i+1)+'</td>'+
   '<td><strong>'+esc(t.id)+'</strong>'+(t.name?'<br><small style="color:#999">'+esc(t.name)+'</small>':'')+'</td>'+
   '<td style="font-size:11px;font-family:monospace;max-width:200px;overflow:hidden;text-overflow:ellipsis">'+esc(t.input_url||'-')+'</td>'+
   '<td style="font-size:11px;font-family:monospace;max-width:200px;overflow:hidden;text-overflow:ellipsis">'+esc(t.output_url||'-')+'</td>'+
   '<td><div class="model-tags">'+(mh||'<span style="color:#ccc;font-size:11px">-</span>')+'</div></td>'+
   '<td><span class="status-badge-sm '+(t.running?'on':'off')+'"><i class="bi-circle-fill" style="font-size:6px"></i>'+(t.running?'Running':'Stopped')+'</span></td>'+
   '<td>'+
    (t.running?'<button class="btn btn-warning btn-sm" onclick="stopTask(\''+t.id+'\')"><i class="bi-stop-fill"></i></button> ':'<button class="btn btn-success btn-sm" onclick="startTask(\''+t.id+'\')"><i class="bi-play-fill"></i></button> ')+
    '<button class="btn btn-outline-danger btn-sm" onclick="deleteTask(\''+t.id+'\')"><i class="bi-trash3"></i></button>'+
   '</td></tr>';
 });
 h+='</tbody></table>';tb.innerHTML=h;
}
function refresh(){
 api('GET','/api/v1/tasks',null,function(r){
  if(r.ok&&r.tasks){render(r.tasks);document.getElementById('connBadge').className='status-badge on';document.getElementById('connBadge').innerHTML='<i class="bi-check-circle-fill"></i> Connected'}
  else{document.getElementById('connBadge').className='status-badge off';document.getElementById('connBadge').innerHTML='<i class="bi-exclamation-circle-fill"></i> Disconnected'}
 })
}
function createTask(){
 var id=document.getElementById('f_id').value||('cam'+Date.now()),name=document.getElementById('f_name').value||id;
 var input=document.getElementById('f_input').value,output=document.getElementById('f_output').value;
 var models=document.getElementById('f_models').value;
 try{JSON.parse(models)}catch(e){toast('Invalid model JSON','danger');return}
 var body=JSON.stringify({id:id,name:name,input_url:input,output_url:output,draw:{show_label:true,show_score:true},models:JSON.parse(models)});
 log('Creating task: '+id,'info');
 api('POST','/api/v1/tasks',body,function(r){
  if(r.ok){
   log('Task "'+id+'" created','ok');toast('Task "'+id+'" created','success');
   if(modal)modal.hide();
   api('POST','/api/v1/tasks/'+id+'/start',null,function(r2){
    if(r2.ok){log('Task "'+id+'" started','ok');toast('Task "'+id+'" started','success')}
    else{log('Start "'+id+'" failed','err')}
    refresh()
   })
  }else{log('Create "'+id+'" failed','err');toast('Create failed','danger')}
 })
}
function startTask(id){log('Starting: '+id,'info');api('POST','/api/v1/tasks/'+id+'/start',null,function(r){if(r.ok){log('Started: '+id,'ok');toast('Started "'+id+'"','success')}else{log('Start failed: '+id,'err')}refresh()})}
function stopTask(id){log('Stopping: '+id,'info');api('POST','/api/v1/tasks/'+id+'/stop',null,function(r){if(r.ok){log('Stopped: '+id,'ok');toast('Stopped "'+id+'"','success')}else{log('Stop failed: '+id,'err')}refresh()})}
function deleteTask(id){if(!confirm('Delete "'+id+'"?'))return;log('Deleting: '+id,'info');api('DELETE','/api/v1/tasks/'+id,null,function(r){if(r.ok){log('Deleted: '+id,'ok');toast('Deleted "'+id+'"','success')}else{log('Delete failed: '+id,'err')}refresh()})}
refresh();setInterval(refresh,5000);log('Web UI initialized','info')
</script>
</body>
</html>
